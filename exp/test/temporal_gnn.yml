model: temporal_gnn

eval:
  min_outbreak: 2
  top_k: [1, 3]
  inverse_rank_offset: [0]
  n_truth: 100

train:
  n_mc: 100
  reps: 3
  test_size: 0.30
  batch_size: 32
  epochs: 200
  patience: 10
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

temporal_gnn:
  hidden_channels: 64
  group_by_time: 1      # one snapshot per time step
                        # increase for denser networks to reduce num_snapshots
