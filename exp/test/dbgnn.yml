model: dbgnn

eval:
  min_outbreak: 1
  top_k: [1, 3]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 100

train:
  n_mc: 100
  reps: 1
  test_size: 0.20
  batch_size: 32
  epochs: 50
  patience: 10
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

dbgnn:
  hidden_channels: 16
  num_conv_layers: 2
  conv_type: sage
  dropout_rate: 0.0
