model: backtracking
eval:
  min_outbreak: 2
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 1000
train:
  n_mc: 500
  reps: 3
  test_size: 0.20
  batch_size: 64
  epochs: 500
  patience: 30
  lr: 0.001
  weight_decay: 0.0001
  seed: 42
backtracking:
  hidden_dim: 32
  num_layers: 6
