model: static_gnn

eval:
  min_outbreak: 1
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 100

train:
  n_mc: 500
  reps: 3
  test_size: 0.30
  batch_size: 128
  epochs: 500
  patience: 5
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

static_gnn:
  num_preprocess_layers: 1
  embed_dim_preprocess: 32
  num_postprocess_layers: 0
  num_conv_layers: 4
  aggr: sum
  hidden_channels: 64
  dropout_rate: 0.1
  batch_norm: true
  skip: true
  use_edge_weights: false
