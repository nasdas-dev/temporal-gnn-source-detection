model: static_gnn

eval:
  min_outbreak: 3
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 50

train:
  n_mc: 5
  reps: 2
  test_size: 0.20
  batch_size: 16
  epochs: 200
  patience: 15
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

static_gnn:
  num_preprocess_layers: 0
  embed_dim_preprocess: 16
  num_postprocess_layers: 0
  num_conv_layers: 3        # shallow: 14 783-node graphs are expensive per layer
  aggr: sum
  hidden_channels: 32       # narrower than smaller networks to limit memory
  dropout_rate: 0.2
  batch_norm: true
  skip: true
  use_edge_weights: false
