model: backtracking

eval:
  min_outbreak: 3       # sparse network — require at least 3 infected nodes
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 50           # kept very small: arrays are ~218 MB per run

train:
  n_mc: 5               # MC samples per source used for GNN training (matches mc_runs)
  reps: 2               # fewer reps: each rep loads the full ~3 GB mc dataset
  test_size: 0.20
  batch_size: 16        # large graphs (14 783 nodes) → small batches
  epochs: 200
  patience: 20
  lr: 0.001
  weight_decay: 0.0001
  seed: 42

backtracking:
  hidden_dim: 32
  num_layers: 4         # shallower than smaller networks to limit oversmoothing
