eval:
  min_outbreak: 1        # paper includes all outbreaks (no minimum filter)
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]       # top-k accuracy thresholds
  inverse_rank_offset: [0]  # rank score offset (0 = 1/rank)
  n_truth: 100           # 100 test scenarios per source node (= 3,400 total; matches paper)

baselines:
  - uniform              # uniform over possible sources
  - random               # random draw from possible sources
  - degree               # highest degree in infected subgraph
  - closeness            # highest closeness centrality
  - betweenness          # highest betweenness centrality
  - jordan_center        # Jordan center of infected subgraph
  - soft_margin          # Soft Margin Estimator (SME)
  - mcs_mean_field       # Monte Carlo Mean Field (MCMF)
