model: static_gnn

# Hyperparameters match Table 4 in Sterchi et al. (2025) for the Karate network.
eval:
  min_outbreak: 2
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 100           # 100 test scenarios per source node (= 3,400 total for karate-34)

train:
  n_mc: 500              # MC runs to use for training (≤ tsir.sir.mc_runs)
  reps: 3                # independent train+eval repetitions (different seeds each)
  test_size: 0.30        # 70% train / 30% val split
  batch_size: 128
  epochs: 500
  patience: 5            # early stopping patience (paper: 5 epochs)
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

static_gnn:
  num_preprocess_layers: 1   # 1 preprocessing MLP layer
  embed_dim_preprocess: 16   # preprocessing embedding dimension
  num_postprocess_layers: 0
  num_conv_layers: 3         # 3 message-passing (GraphConv/sum) layers
  aggr: sum
  hidden_channels: 16        # message-passing embedding dimension
  dropout_rate: 0.1
  batch_norm: true
  skip: true                 # skip connection from input to output
  use_edge_weights: false
