model: temporal_gnn

eval:
  min_outbreak: 5
  top_k: [1, 3, 5, 10]
  inverse_rank_offset: [0]
  n_truth: 500

train:
  n_mc: 200
  reps: 3
  test_size: 0.20
  batch_size: 32
  epochs: 300
  patience: 20
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

temporal_gnn:
  hidden_channels: 64
  group_by_time: 50     # bin 671 steps into ~13 snapshots to keep memory manageable
