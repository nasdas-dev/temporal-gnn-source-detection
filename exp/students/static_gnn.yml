model: static_gnn

eval:
  min_outbreak: 5
  top_k: [1, 3, 5, 10]
  inverse_rank_offset: [0]
  n_truth: 500

train:
  n_mc: 200
  reps: 3
  test_size: 0.20
  batch_size: 32
  epochs: 300
  patience: 15
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

static_gnn:
  num_preprocess_layers: 0
  embed_dim_preprocess: 16
  num_postprocess_layers: 0
  num_conv_layers: 4
  aggr: sum
  hidden_channels: 64
  dropout_rate: 0.2
  batch_norm: true
  skip: true
  use_edge_weights: false
