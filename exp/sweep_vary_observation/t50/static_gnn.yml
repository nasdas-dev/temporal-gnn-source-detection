model: static_gnn

eval:
  min_outbreak: 2
  top_k: [1, 3, 5, 10]
  credible_p: [0.80, 0.90]
  inverse_rank_offset: [0]
  n_truth: 1000

train:
  n_mc: 500              # MC runs to use for training (≤ tsir.sir.mc_runs)
  reps: 3                # independent train+eval repetitions
  test_size: 0.30
  batch_size: 128
  epochs: 500
  patience: 10
  lr: 0.001
  weight_decay: 0.0005
  seed: 42

static_gnn:
  num_preprocess_layers: 0
  embed_dim_preprocess: 16
  num_postprocess_layers: 0
  num_conv_layers: 4
  aggr: sum
  hidden_channels: 64
  dropout_rate: 0.2
  batch_norm: true
  skip: true
  use_edge_weights: false  # weight edges by contact count
